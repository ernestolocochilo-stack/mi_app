name: Build Flet APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar y Actualizar Flet
        run: |
          pip install --upgrade pip
          pip install flet --upgrade

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Crear APK
        run: |
          # El comando 'yes' enviará automáticamente una "y" a todas las preguntas
          yes | flet build apk --product "Elite Travel"

      - name: Subir APK Final
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/apk/*.apk
