name: Build Flet APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Actualizado a v4

      - name: Install Python
        uses: actions/setup-python@v5 # Actualizado a v5
        with:
          python-version: '3.10'

      - name: Install Flet
        run: |
          pip install flet

      - name: Setup Java
        uses: actions/setup-java@v4 # Actualizado a v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK
        run: flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4 # ESTE ERA EL ERROR (Cambiado a v4)
        with:
          name: app-release
          path: build/apk/*.apk
